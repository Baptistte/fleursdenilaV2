<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Fleurs de Nila</title>
  <link rel="preload" as="font" href="../FleurDeLeah-Regular.woff2" type="font/woff2" crossorigin>
  <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
  <style>
    @font-face {
      font-family: 'FleurDeLeah';
      src: url('../FleurDeLeah-Regular.woff2') format('woff2');
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fond ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: #0b1f35;
      position: relative;
      overflow: hidden;
    }

    /* Dégradé de fond */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(29,78,140,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(13,33,55,0.8) 0%, transparent 60%),
        linear-gradient(160deg, #0d2137 0%, #0b1a2e 50%, #060f1e 100%);
      z-index: 0;
    }

    /* Grille de points */
    .bg-dots {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: radial-gradient(circle, rgba(190,227,248,0.07) 1px, transparent 1px);
      background-size: 26px 26px;
    }

    /* Orbes de lumière */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 2;
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      top: -160px; left: -120px;
      background: radial-gradient(circle, rgba(45,82,130,0.45) 0%, transparent 70%);
    }
    .orb-2 {
      width: 420px; height: 420px;
      bottom: -140px; right: -100px;
      background: radial-gradient(circle, rgba(190,227,248,0.1) 0%, transparent 70%);
    }
    .orb-3 {
      width: 300px; height: 300px;
      top: 40%; left: 60%;
      background: radial-gradient(circle, rgba(29,78,140,0.25) 0%, transparent 70%);
    }

    /* ── Card ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 4px;
      padding: 48px 44px 44px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.28),
        0 32px 80px rgba(0,0,0,0.22);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .login-logo img {
      height: 60px;
      width: auto;
    }
    .login-logo-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4c5b0, transparent);
      margin: 18px auto 14px;
    }
    .login-logo-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 500;
    }

    /* Titre */
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #0d2137;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .login-subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    /* Champs */
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 7px;
    }
    .field-input-wrap {
      position: relative;
    }
    .field-input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 3px;
      padding: 11px 14px 11px 40px;
      font-size: 14px;
      color: #0d2137;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .field input::placeholder { color: #c8d0db; }
    .field input:focus {
      border-color: #1a365d;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,54,93,0.08);
    }

    /* Bouton */
    #login-btn {
      width: 100%;
      margin-top: 24px;
      padding: 13px 20px;
      background: #0d2137;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(13,33,55,0.25);
    }
    #login-btn:hover:not(:disabled) {
      background: #1a365d;
      box-shadow: 0 4px 16px rgba(13,33,55,0.35);
    }
    #login-btn:active:not(:disabled) { transform: translateY(1px); }
    #login-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Spinner */
    .spin {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Erreur */
    #error-msg {
      display: none;
      margin-bottom: 20px;
      font-size: 13px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 3px;
      padding: 11px 14px;
      line-height: 1.5;
    }

    /* Pied de card */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: #cbd5e1;
      letter-spacing: 0.06em;
    }
    .login-footer a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.15s;
    }
    .login-footer a:hover { color: #0d2137; }

    /* Badge bas de page */
    .page-badge {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(190,227,248,0.3);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="bg-dots"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <a href="../index.html">
          <img src="../images/logo-fleurs-de-nila-fleuriste-nimes-400w.webp" alt="Fleurs de Nila">
        </a>
        <div class="login-logo-divider"></div>
        <span class="login-logo-label">Espace administration</span>
      </div>

      <!-- Titre -->
      <div class="login-title">Connexion</div>
      <div class="login-subtitle">Accédez à votre tableau de bord</div>

      <!-- Erreur -->
      <div id="error-msg"></div>

      <!-- Formulaire -->
      <div class="field">
        <label for="username">Identifiant</label>
        <div class="field-input-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input id="username" type="text" autocomplete="username" placeholder="admin" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="field-input-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
      </div>

      <button id="login-btn">
        <span id="login-label">Se connecter</span>
        <div class="spin" id="login-spinner"></div>
      </button>

      <!-- Pied -->
      <div class="login-footer">
        <a href="../index.html">← Retour à la boutique</a>
      </div>

    </div>
  </div>

  <div class="page-badge">Fleurs de Nila · Nîmes</div>

  <script>
    const API = 'http://localhost:3000';

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!username || !password) {
        errEl.textContent = 'Veuillez renseigner vos identifiants.';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      document.getElementById('login-label').textContent = 'Connexion…';
      document.getElementById('login-spinner').style.display = 'block';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'produits.html';
        } else {
          const data = await res.json();
          errEl.textContent = data.error || 'Identifiants incorrects.';
          errEl.style.display = 'block';
          btn.disabled = false;
          document.getElementById('login-label').textContent = 'Se connecter';
          document.getElementById('login-spinner').style.display = 'none';
        }
      } catch {
        errEl.textContent = 'Impossible de joindre le serveur. Vérifiez que l\'API est démarrée.';
        errEl.style.display = 'block';
        btn.disabled = false;
        document.getElementById('login-label').textContent = 'Se connecter';
        document.getElementById('login-spinner').style.display = 'none';
      }
    }

    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>
</html>
